<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>rak baca au</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='50%25' y='54%25' font-size='48' text-anchor='middle' dominant-baseline='middle'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  :root{
    --pink:#ffb8d4;
    --pink-soft:#ffe0ee;
    --blue:#9fd3ff;
    --blue-soft:#e2f1ff;
    --surface:rgba(255,255,255,0.72);
    --surface-solid:#ffffff;
    --ink:#2c2a4a;
    --ink-muted:#77738f;
    --border:rgba(44,42,74,0.10);
    --accent:#ff7fae;
    --accent2:#4fa6ec;
    --success:#59b98a;
    --warn:#e0a94a;
    --danger:#e2677a;
    --plan:#8b7de0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 10% 5%, var(--pink-soft), transparent 45%),
      radial-gradient(circle at 90% 10%, var(--blue-soft), transparent 45%),
      linear-gradient(160deg, #fff0f6 0%, #eef6ff 55%, #eaf3ff 100%);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:28px 16px 70px;
  }
  .wrap{max-width:800px;margin:0 auto;}

  header{margin-bottom:18px;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--accent2);margin:0 0 6px;font-weight:500;
  }
  h1{
    font-family:'Fraunces',serif;font-weight:700;font-size:32px;
    margin:0 0 6px;line-height:1.08;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{color:var(--ink-muted);font-size:13.5px;margin:0;max-width:48ch;}

  .theme-bar{display:flex;align-items:center;gap:7px;margin:0 0 14px;flex-wrap:wrap;}
  .theme-label{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-muted);
    text-transform:uppercase;letter-spacing:.05em;margin-right:2px;
  }
  .theme-swatch{
    width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;
    box-shadow:0 2px 6px rgba(44,42,74,.15);transition:transform .1s;
  }
  .theme-swatch:hover{transform:scale(1.12);}
  .theme-swatch.active{border-color:var(--ink);}

  .sync-bar{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:10px 14px;margin:14px 0;backdrop-filter:blur(6px);
    font-size:12.5px;color:var(--ink-muted);
  }
  .sync-bar.offline{background:var(--pink-soft);}
  .sync-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .sync-row + .sync-row{margin-top:10px;}
  .sync-row code{
    background:var(--surface-solid);padding:3px 8px;border-radius:6px;
    font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent2);letter-spacing:.04em;
  }
  .room-name-display{color:var(--ink);font-weight:700;}
  .sync-row button{
    background:none;border:1px solid var(--border);color:var(--ink-muted);
    font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;
    border-radius:7px;cursor:pointer;
  }
  .sync-row button:hover{border-color:var(--accent2);color:var(--accent2);}
  .join-box{display:none;gap:6px;margin-top:8px;}
  .join-box.open{display:flex;}
  .join-box input{flex:1;}
  .join-box button{
    background:var(--accent2);color:#fff;border:none;border-radius:7px;
    padding:0 14px;font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;cursor:pointer;
  }
  .auth-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .auth-row img{width:22px;height:22px;border-radius:50%;}
  .auth-row .who{font-size:12.5px;color:var(--ink);font-weight:600;}
  .btn-google{
    display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);
    color:var(--ink);font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;
    padding:7px 12px;border-radius:8px;cursor:pointer;
  }
  .btn-google:hover{border-color:var(--accent2);}
  .btn-x{
    display:flex;align-items:center;gap:6px;background:#000;border:1px solid #000;
    color:#fff;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;
    padding:7px 12px;border-radius:8px;cursor:pointer;
  }
  .btn-x:hover{opacity:0.85;}
  .btn-logout{
    background:none;border:1px solid var(--border);color:var(--ink-muted);
    font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;
    border-radius:7px;cursor:pointer;
  }
  .owner-badge{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;
    padding:3px 9px;border-radius:999px;letter-spacing:.03em;
  }
  .owner-badge.mine{background:#e2f6ea;color:var(--success);}
  .owner-badge.view{background:#fdf1de;color:var(--warn);}
  .btn-mine{
    background:none;border:1px solid var(--border);color:var(--accent2);
    font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;
    border-radius:7px;cursor:pointer;
  }
  .view-only-note{
    font-size:12px;color:var(--ink-muted);background:var(--surface);border:1px dashed var(--border);
    border-radius:10px;padding:10px 14px;margin-bottom:20px;
  }

  .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .stat{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:8px 12px;min-width:74px;backdrop-filter:blur(6px);
  }
  .stat b{display:block;font-family:'Fraunces',serif;font-size:19px;font-weight:700;}
  .stat span{font-size:10.5px;color:var(--ink-muted);font-family:'JetBrains Mono',monospace;}

  /* dashboard */
  .dashboard{
    background:var(--surface-solid);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
    margin-bottom:20px;
    box-shadow:0 8px 24px rgba(120,110,200,0.06);
  }
  .dashboard h2{
    font-family:'Fraunces',serif;font-size:15px;font-weight:700;margin:0 0 12px;
    display:flex;align-items:center;gap:6px;
  }
  .dashboard h2::before{content:"◈";color:var(--accent);}
  .dash-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  .dash-col-title{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-muted);margin-bottom:8px;
  }
  .bar-row{margin-bottom:8px;}
  .bar-label{
    display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;
  }
  .bar-label b{font-weight:600;color:var(--ink);}
  .bar-label span{color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:11px;}
  .bar-track{background:var(--pink-soft);border-radius:6px;height:7px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .dash-empty{font-size:12px;color:var(--ink-muted);font-style:italic;}
  @media (max-width:480px){
    .dash-cols{grid-template-columns:1fr;}
  }

  /* quick add */
  .composer{
    background:var(--surface-solid);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
    margin-bottom:20px;
    box-shadow:0 8px 24px rgba(120,110,200,0.08);
  }
  .quickrow{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
  .quickrow .field{flex:1 1 160px;}
  .quickrow .field.status-field{flex:0 0 140px;}
  .field-label{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--ink-muted);margin-bottom:4px;display:block;
  }
  .field{display:flex;flex-direction:column;}
  input[type=text],input[type=url],textarea,select{
    background:var(--pink-soft);
    border:1px solid transparent;
    color:var(--ink);
    border-radius:9px;
    padding:10px 12px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    outline:none;
    width:100%;
  }
  select{background:var(--blue-soft);cursor:pointer;appearance:none;}
  input::placeholder,textarea::placeholder{color:#9d97b8;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent2);}
  textarea{resize:vertical;min-height:40px;}

  .toggle-detail{
    background:none;border:none;color:var(--accent2);font-size:12px;font-weight:600;
    cursor:pointer;padding:8px 2px 2px;font-family:'JetBrains Mono',monospace;
  }
  .detail-box{display:none;margin-top:10px;gap:8px;flex-direction:column;}
  .detail-box.open{display:flex;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

  .composer-footer{display:flex;justify-content:flex-end;margin-top:12px;}
  .btn-add{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#fff;border:none;font-family:'Inter',sans-serif;font-weight:700;
    font-size:13px;padding:10px 20px;border-radius:9px;cursor:pointer;
    box-shadow:0 4px 14px rgba(255,127,174,0.35);
  }
  .btn-add:hover{opacity:0.92;}

  /* filters */
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .filters button{
    background:var(--surface);border:1px solid var(--border);color:var(--ink-muted);
    font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px;
    border-radius:999px;cursor:pointer;backdrop-filter:blur(6px);
  }
  .filters button.active{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#fff;border-color:transparent;font-weight:600;
  }
  .search{margin:10px 0 18px;}
  .search input{background:var(--surface-solid);}

  /* cards */
  #list{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
    align-items:start;
  }
  #list .empty,#list .loading{grid-column:1 / -1;}
  .card{
    background:var(--surface-solid);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    box-shadow:0 6px 18px rgba(120,110,200,0.06);
  }
  .badge-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .badge-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .status-badge{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;
    padding:4px 9px;border-radius:6px;font-weight:600;display:inline-block;
  }
  .status-badge.plan{background:#ece7ff;color:var(--plan);}
  .status-badge.reading{background:#ffe3ee;color:var(--accent);}
  .status-badge.completed{background:#e2f6ea;color:var(--success);}
  .status-badge.hiatus{background:#fdf1de;color:var(--warn);}
  .status-badge.dropped{background:#fbe4e7;color:var(--danger);}
  .type-badge{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;
    padding:4px 9px;border-radius:6px;font-weight:600;display:inline-block;
    background:var(--blue-soft);color:var(--accent2);border:1px solid transparent;
  }
  .type-badge.oneshot{background:#fff1e0;color:#c07f1f;}
  .type-badge.series{background:var(--blue-soft);color:var(--accent2);}

  .del{background:none;border:none;color:#c7c2dc;cursor:pointer;font-size:15px;padding:2px 4px;}
  .del:hover{color:var(--danger);}
  .edit-btn{background:none;border:none;color:#c7c2dc;cursor:pointer;font-size:14px;padding:2px 4px;}
  .edit-btn:hover{color:var(--accent2);}
  .card-actions{display:flex;gap:2px;}

  /* edit modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(44,42,74,0.4);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;padding:20px;z-index:1000;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:var(--surface-solid);border:1px solid var(--border);border-radius:16px;
    padding:20px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;
    box-shadow:0 20px 60px rgba(44,42,74,0.28);
  }
  .modal-box h3{
    font-family:'Fraunces',serif;font-weight:700;font-size:18px;margin:0 0 14px;
  }

  .edit-form{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .edit-form input,.edit-form textarea,.edit-form select{background:var(--pink-soft);}
  .edit-form .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .edit-form-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:4px;}
  .btn-save{
    background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border:none;
    font-weight:700;font-size:12.5px;padding:8px 16px;border-radius:8px;cursor:pointer;
  }
  .btn-cancel{
    background:none;border:1px solid var(--border);color:var(--ink-muted);
    font-size:12.5px;padding:8px 14px;border-radius:8px;cursor:pointer;
  }

  .card-title{
    font-family:'Fraunces',serif;font-weight:700;font-size:17.5px;line-height:1.25;margin-top:8px;
  }
  .card-title a{color:var(--ink);text-decoration:none;border-bottom:1.5px solid var(--pink);}
  .card-title a:hover{color:var(--accent);}
  .jump-hint{
    font-size:11px;color:var(--ink-muted);font-family:'JetBrains Mono',monospace;
    margin-top:3px;
  }
  .jump-hint b{color:var(--accent2);}
  .tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
  .tag-group,.tag-ship{
    font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:999px;
    font-family:'Inter',sans-serif;
  }
  .tag-group{background:var(--blue-soft);color:var(--accent2);}
  .tag-ship{background:var(--pink-soft);color:var(--accent);}
  .tag-author{background:#f1edff;color:var(--plan);}
  .notes{font-size:12.5px;color:var(--ink-muted);margin-top:8px;line-height:1.5;}

  .meta-row{
    display:flex;justify-content:flex-end;align-items:center;
    margin-top:12px;padding-top:10px;border-top:1px dashed var(--border);
    font-size:12px;color:var(--ink-muted);flex-wrap:wrap;gap:6px;
  }
  .copy-link{
    display:flex;align-items:center;gap:5px;
    background:var(--blue-soft);color:var(--accent2);
    border:none;border-radius:999px;padding:6px 12px;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
    cursor:pointer;
  }
  .copy-link:hover{background:var(--blue);color:#0d3a5c;}
  .copy-link.copied{background:var(--success);color:#12281a;}
  .copy-link[disabled]{opacity:0.4;cursor:default;}

  .empty{
    text-align:center;padding:44px 20px;color:var(--ink-muted);
    border:1.5px dashed var(--border);border-radius:14px;background:var(--surface);
  }
  .empty b{display:block;font-family:'Fraunces',serif;font-weight:700;font-size:17px;color:var(--ink);margin-bottom:5px;}

  .loading{text-align:center;color:var(--ink-muted);padding:26px;font-family:'JetBrains Mono',monospace;font-size:12px;}
  @media (max-width:480px){
    h1{font-size:26px;}
    .detail-grid{grid-template-columns:1fr;}
    .quickrow .field.status-field{flex:1 1 100%;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="eyebrow">rak baca &mdash; thread AU</p>
    <h1 id="page-title">RAK BACA AU</h1>
  </header>

  <div class="theme-bar" id="theme-bar"></div>

  <div class="sync-bar" id="sync-bar"></div>

  <div class="stats" id="stats"></div>

  <div class="dashboard">
    <h2>ringkasan bacaan kamu</h2>
    <div class="dash-cols">
      <div>
        <div class="dash-col-title">grup paling sering dibaca</div>
        <div id="dash-group"></div>
      </div>
      <div>
        <div class="dash-col-title">ship favorit kamu</div>
        <div id="dash-ship"></div>
      </div>
      <div>
        <div class="dash-col-title">author langganan</div>
        <div id="dash-author"></div>
      </div>
    </div>
  </div>

  <div class="composer">
    <div class="quickrow">
      <div class="field">
        <label class="field-label" for="f-title">judul AU</label>
        <input type="text" id="f-title" placeholder="cth. Red String Theory">
      </div>
      <div class="field">
        <label class="field-label" for="f-link">link thread awal</label>
        <input type="url" id="f-link" placeholder="https://x.com/...">
      </div>
      <div class="field status-field">
        <label class="field-label" for="f-status">status</label>
        <select id="f-status">
          <option value="plan">ingin dibaca</option>
          <option value="reading" selected>sedang dibaca</option>
          <option value="completed">selesai</option>
          <option value="hiatus">hiatus</option>
          <option value="dropped">drop</option>
        </select>
      </div>
      <div class="field status-field">
        <label class="field-label" for="f-type">tipe</label>
        <select id="f-type">
          <option value="oneshot">one shot</option>
          <option value="series" selected>series</option>
        </select>
      </div>
    </div>
    <button class="toggle-detail" id="toggle-detail">+ tambah detail (grup, ship, author, catatan)</button>
    <div class="detail-box" id="detail-box">
      <div class="detail-grid">
        <div class="field">
          <label class="field-label" for="f-group">grup</label>
          <input type="text" id="f-group" list="list-group" placeholder="cth. Stray Kids, NCT">
        </div>
        <div class="field">
          <label class="field-label" for="f-ship">ship / couple</label>
          <input type="text" id="f-ship" list="list-ship" placeholder="cth. Minwon">
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="f-author">author</label>
        <input type="text" id="f-author" list="list-author" placeholder="cth. @penulisnya">
      </div>
      <div class="field">
        <label class="field-label" for="f-lastlink">link part terakhir dibaca</label>
        <input type="url" id="f-lastlink" placeholder="isi kalau statusnya sedang dibaca">
      </div>
      <div class="field">
        <label class="field-label" for="f-notes">catatan kecil</label>
        <textarea id="f-notes" placeholder="plot twist yang bikin nangis, dsb"></textarea>
      </div>
    </div>
    <datalist id="list-group"></datalist>
    <datalist id="list-ship"></datalist>
    <datalist id="list-author"></datalist>
    <div class="composer-footer">
      <button class="btn-add" id="btn-add">+ tambah ke rak</button>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="filters" id="type-filters"></div>
  <div class="search">
    <input type="text" id="search" placeholder="cari judul, grup, atau ship...">
  </div>

  <div id="list"><div class="loading">memuat rak kamu...</div></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
const THEMES = {
  sakura:   {label:'Sakura',   pink:'#ffb8d4', pinkSoft:'#ffe0ee', blue:'#9fd3ff', blueSoft:'#e2f1ff', accent:'#ff7fae', accent2:'#4fa6ec', plan:'#8b7de0'},
  lavender: {label:'Lavender', pink:'#c9b6ff', pinkSoft:'#efe6ff', blue:'#9fd3ff', blueSoft:'#e6f0ff', accent:'#9b7bef', accent2:'#5b8de0', plan:'#7c6fe0'},
  mint:     {label:'Mint',     pink:'#8fe3c0', pinkSoft:'#e2fbf1', blue:'#8fd8e8', blueSoft:'#e3f8fc', accent:'#2fae85', accent2:'#2f9bc0', plan:'#4f9e8f'},
  sunset:   {label:'Sunset',   pink:'#ffb37a', pinkSoft:'#fff0e0', blue:'#ff9aa8', blueSoft:'#ffe8ec', accent:'#ff7f4f', accent2:'#e0567e', plan:'#e08a4f'},
  mono:     {label:'Mono',     pink:'#cfcfd8', pinkSoft:'#f1f1f4', blue:'#b7bdc9', blueSoft:'#eef0f3', accent:'#2c2a4a', accent2:'#55536e', plan:'#4a4866'},
};
let currentTheme = localStorage.getItem('au-theme') || 'sakura';

function applyTheme(name){
  const t = THEMES[name] || THEMES.sakura;
  const root = document.documentElement.style;
  root.setProperty('--pink', t.pink);
  root.setProperty('--pink-soft', t.pinkSoft);
  root.setProperty('--blue', t.blue);
  root.setProperty('--blue-soft', t.blueSoft);
  root.setProperty('--accent', t.accent);
  root.setProperty('--accent2', t.accent2);
  root.setProperty('--plan', t.plan);
  localStorage.setItem('au-theme', name);
  currentTheme = name;
  renderThemeBar();
}

    <button class="theme-swatch ${key===currentTheme?'active':''}" data-theme="${key}" title="${esc(t.label)}"
      style="background:linear-gradient(135deg, ${t.accent}, ${t.accent2})"></button>
  `).join('');
  el.querySelectorAll('.theme-swatch').forEach(btn=>{
    btn.addEventListener('click', ()=> applyTheme(btn.dataset.theme));
  });
}

async function ensureOwnRoom(user){
  const ownerRef = db.collection('au-owners').doc(user.uid);
  const ownerSnap = await ownerRef.get();
  if(ownerSnap.exists && ownerSnap.data().roomCode){
    myRoomCode = ownerSnap.data().roomCode;
    return myRoomCode;
  }
  // belum punya rak -> bikin baru
  let code = genCode();
  await db.collection('au-lists').doc(code).set({ entries: [], ownerUid: user.uid }, { merge:true });
  await ownerRef.set({ roomCode: code, email: user.email || null });
  myRoomCode = code;
  return code;
}

function genCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out = '';
  for(let i=0;i<6;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}

async function loadEntries(){

function renderList(){
  const el = document.getElementById('list');
  let filtered = entries.filter(e=>{
    if(currentFilter !== 'all' && e.status !== currentFilter) return false;
    if(currentTypeFilter !== 'all' && e.type !== currentTypeFilter) return false;
    if(currentSearch){
      const q = currentSearch.toLowerCase();
      const hay = (e.title+' '+e.group+' '+e.ship+' '+e.author).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  filtered.sort((a,b)=> b.addedAt - a.addedAt);

  if(filtered.length === 0){
    el.innerHTML = `<div class="empty"><b>belum ada yang di-list</b>tambahin AU pertama dari form di atas.</div>`;
    return;
  }

  el.innerHTML = filtered.map(e=>{
    const meta = STATUS_META[e.status] || STATUS_META.plan;
    const typeMeta = TYPE_META[e.type] || null;
    const canEdit = !useFirebase || isOwner();
    // di mode "lihat aja", selalu buka link thread awal — lastLink itu progres pribadi si pemilik rak
    const activeLink = (canEdit && e.status === 'reading' && e.lastLink) ? e.lastLink : e.link;
    const titleHtml = activeLink
      ? `<a href="${esc(activeLink)}" target="_blank" rel="noopener">${esc(e.title)}</a>`
      : esc(e.title);
    let jumpHint = '';
    if(canEdit && e.status === 'reading' && e.lastLink){
      jumpHint = `<div class="jump-hint">↳ klik judul buat <b>lanjut dari part terakhir</b></div>`;
    }else if(canEdit && e.status === 'reading' && !e.lastLink && e.link){
      jumpHint = `<div class="jump-hint">↳ belum ada link part terakhir, klik judul buat ke awal thread</div>`;
    }else if(e.status === 'plan' && e.link){
      jumpHint = `<div class="jump-hint">↳ klik judul buat mulai dari awal thread</div>`;
    }else if(!canEdit && e.status === 'reading' && e.link){
      jumpHint = `<div class="jump-hint">↳ klik judul buat ke awal thread</div>`;
    }
    return `
      <div class="card">
        <div class="badge-row">
          <div class="badge-group">
            <span class="status-badge ${meta.cls}">${meta.label}</span>
            ${typeMeta ? `<span class="type-badge ${typeMeta.cls}">${typeMeta.label}</span>` : ''}
          </div>
          ${canEdit ? `
          <div class="card-actions">
            <button class="edit-btn" data-id="${e.id}" title="edit">✎</button>
            <button class="del" data-id="${e.id}" title="hapus">✕</button>
          </div>
          ` : ''}
        </div>
        <div class="card-title">${titleHtml}</div>
        ${jumpHint}
        ${(e.group || e.ship || e.author) ? `<div class="tag-row">
          ${e.group ? `<span class="tag-group">${esc(e.group)}</span>` : ''}
          ${e.ship ? `<span class="tag-ship">${esc(e.ship)}</span>` : ''}
          ${e.author ? `<span class="tag-author">${esc(e.author)}</span>` : ''}
        </div>` : ''}
        ${e.notes ? `<div class="notes">${esc(e.notes)}</div>` : ''}
        <div class="meta-row">
          <button class="copy-link" data-id="${e.id}" ${activeLink ? '' : 'disabled'}>⧉ salin link</button>
        </div>
      </div>
    `;
  }).join('');

  el.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(useFirebase && !isOwner()) return;
      const id = btn.getAttribute('data-id');
      entries = entries.filter(e=>e.id !== id);
      await saveEntries();
      render();
    });
  });

  el.querySelectorAll('.edit-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(useFirebase && !isOwner()) return;
      openEditModal(btn.getAttribute('data-id'));
    });
  });

  el.querySelectorAll('.copy-link').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-id');
      const entry = entries.find(x=>x.id === id);
      if(!entry) return;
      const link = (isOwner() && entry.status === 'reading' && entry.lastLink) ? entry.lastLink : entry.link;
      if(!link) return;
      try{
        await navigator.clipboard.writeText(link);
      }catch(e){
        const ta = document.createElement('textarea');
        ta.value = link;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      const original = btn.textContent;
      btn.textContent = '✓ tersalin';
      btn.classList.add('copied');
      setTimeout(()=>{
        btn.textContent = original;
        btn.classList.remove('copied');
      }, 1400);
    });
  });

}

function renderDashboard(){
  const groupCounts = {};
  const shipCounts = {};
  const authorCounts = {};
  entries.forEach(e=>{
    if(e.group) groupCounts[e.group] = (groupCounts[e.group]||0) + 1;
    if(e.ship) shipCounts[e.ship] = (shipCounts[e.ship]||0) + 1;
    if(e.author) authorCounts[e.author] = (authorCounts[e.author]||0) + 1;
  });

  function renderBars(counts, elId){
    const el = document.getElementById(elId);
    const list = Object.entries(counts).sort((a,b)=> b[1]-a[1]).slice(0,5);
    if(list.length === 0){
      el.innerHTML = `<div class="dash-empty">belum ada data, isi pas nambah AU ya.</div>`;
      return;
    }
    const max = list[0][1];
    el.innerHTML = list.map(([name,count])=>`
      <div class="bar-row">
        <div class="bar-label"><b>${esc(name)}</b><span>${count}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(count/max*100)}%"></div></div>
      </div>
    `).join('');
  }

  renderBars(groupCounts, 'dash-group');
  renderBars(shipCounts, 'dash-ship');
  renderBars(authorCounts, 'dash-author');
}

function renderAutocomplete(){
  function uniqueValues(field){
    return [...new Set(entries.map(e=>e[field]).filter(Boolean))].sort();

  function fillDatalist(elId, values){
    const el = document.getElementById(elId);
    el.innerHTML = values.map(v=>`<option value="${esc(v)}"></option>`).join('');
  }
  fillDatalist('list-group', uniqueValues('group'));
  fillDatalist('list-ship', uniqueValues('ship'));
  fillDatalist('list-author', uniqueValues('author'));
}

function render(){
  renderComposerLock();
  renderStats();
  renderDashboard();
  renderFilters();
  renderTypeFilters();
  renderList();
  renderAutocomplete();
}

function renderComposerLock(){
  const composerEl = document.querySelector('.composer');
  const noteId = 'view-only-note';
  let note = document.getElementById(noteId);
  if(!useFirebase || isOwner()){
    composerEl.style.display = '';
    if(note) note.remove();
  }else{
    composerEl.style.display = 'none';
    if(!note){
      note = document.createElement('div');
      note.id = noteId;
      note.className = 'view-only-note';
      note.textContent = roomCode
        ? 'ini rak orang lain — kamu cuma bisa lihat, enggak bisa nambah/edit/hapus.'
        : 'login dengan Google buat bikin rak sendiri, atau masukin kode rak temenmu buat liat-liat.';
      composerEl.parentNode.insertBefore(note, composerEl);
    }
  }
}

async function addEntry(){
  if(useFirebase && !isOwner()){ alert('ini rak orang lain, kamu enggak bisa nambah AU di sini.'); return; }
  const title = document.getElementById('f-title').value.trim();
  if(!title){ document.getElementById('f-title').focus(); return; }
  const entry = {
    id: uid(),
    title,
    link: document.getElementById('f-link').value.trim(),
    status: document.getElementById('f-status').value,
    type: document.getElementById('f-type').value,
    group: document.getElementById('f-group').value.trim(),
    ship: document.getElementById('f-ship').value.trim(),
    author: document.getElementById('f-author').value.trim(),
    lastLink: document.getElementById('f-lastlink').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    addedAt: Date.now(),
  };
  entries.push(entry);
  await saveEntries();

  document.getElementById('f-title').value = '';
  document.getElementById('f-link').value = '';
  document.getElementById('f-status').value = 'reading';
  document.getElementById('f-type').value = 'series';
  document.getElementById('f-group').value = '';
  document.getElementById('f-ship').value = '';
  document.getElementById('f-author').value = '';
  document.getElementById('f-lastlink').value = '';
  document.getElementById('f-notes').value = '';

  render();
}

document.getElementById('btn-add').addEventListener('click', addEntry);
document.getElementById('search').addEventListener('input', (e)=>{
  currentSearch = e.target.value;
  renderList();
});
document.getElementById('toggle-detail').addEventListener('click', ()=>{
  const box = document.getElementById('detail-box');
  box.classList.toggle('open');
});
document.getElementById('modal-overlay').addEventListener('click', (e)=>{
  if(e.target.id === 'modal-overlay') closeEditModal();
});
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') closeEditModal();
});

loadEntries();
</script>
</body>
</html>
